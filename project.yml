# XcodeGen specification for the Atlas Tune iPadOS app.
#
# The engine lives in the local Swift package `AtlasTuneCore` (Sources/AtlasTuneCore) and is
# fully unit-tested on its own. This app target links that package and adds the SwiftUI / Metal /
# SwiftData layer under App/.
#
# Generate the Xcode project with:  xcodegen generate
name: AtlasTune
options:
  bundleIdPrefix: com.atlastune
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

packages:
  AtlasTuneCore:
    path: .

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "2"            # iPad only
    SUPPORTS_MACCATALYST: false
    ENABLE_USER_SCRIPT_SANDBOXING: true
    # 'targeted' avoids the false positives that 'complete' raises around Network.framework
    # callbacks while still checking code that opts into Sendable.
    SWIFT_STRICT_CONCURRENCY: targeted

targets:
  AtlasTune:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/AtlasTune
    dependencies:
      - package: AtlasTuneCore
        product: AtlasTuneCore
    settings:
      base:
        INFOPLIST_FILE: App/AtlasTune/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/AtlasTune/Resources/AtlasTune.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.atlastune.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_PREVIEWS: true
        METAL_FAST_MATH: true
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
